services:
  app:
    build: .
    container_name: url-shortener-app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always
  db:
    image: postgres:latest
    container_name: url-shortener-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis
    command: redis-server --requirepass Redis2019!
    ports:
      - "6379:6379"
  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    depends_on:
      - db
    command: [ "-path", "/migrations", "-database", "postgres://myuser:mypassword@db:5432/url-shortener?sslmode=disable", "up" ]

volumes:
  pgdata:
