services:
  app:
    build: .
    container_name: url-shortener-app
    depends_on:
      - db
      # - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always
  db:
    image: postgres:15
    container_name: url-shortener-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq
  #   ports:
  #     - 5672:5672
  #     - 15672:15672
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq

volumes:
  pgdata:
  # rabbitmq_data:
